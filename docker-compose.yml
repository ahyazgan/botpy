# Kripto haber-trade radarı — 7/24 dağıtım.
#   docker compose up -d        → haber motoru (http://localhost:8000)
# Ayarları .env dosyasından alır (opsiyonel: ANTHROPIC_API_KEY ile akıllı puanlama,
# TELEGRAM_*/DISCORD_* ile uzaktan bildirim, BINANCE_* ile canlı işlem, API_TOKEN ile
# mutasyon uçları koruması). Arşiv/state `botpy-data` volume'ünde kalıcı (restart'a dayanıklı).
services:
  engine:
    build: .
    image: botpy-news-radar
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - botpy-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  botpy-data:
